<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoElite - ენციკლოპედია</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <nav>
        <div class="logo">AUTO<span>ELITE</span></div>
    </nav>
    
    <header>
        <h1>პრემიუმ ავტომობილების კატალოგი</h1>
        <p>დააჭირე ბარათს ვრცელი ისტორიული და ტექნიკური ინფოსთვის</p>
    </header>

    <main class="gallery" id="gallery"></main>

    <div id="carModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 AutoElite Encyclopedia</p>
    </footer>

</html>
